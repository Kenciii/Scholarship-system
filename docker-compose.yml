
services:
  db:
    image: postgres:15-alpine
    container_name: stipendije-db
    environment:
      - POSTGRES_DB=stipendije_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: stipendije-backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/stipendije_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SORING_JPA_HIBERNATE_DDL_AUTO=update